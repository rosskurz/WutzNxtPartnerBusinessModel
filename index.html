<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WutzNxt Partner Businesses</title>
<style>
:root{
  color-scheme: light;
  --bg:#f6f7f9; --card:#ffffff; --ink:#1c2128; --muted:#5b6573;
  --line:#e4e7ec; --accent:#2f6fed; --accent-soft:#eaf1fe;
  --green:#1a7f37; --green-soft:#e6f4ea; --amber:#9a6700; --amber-soft:#fdf3d7;
  --red:#b42318; --red-soft:#fdeceb; --grey:#667085; --grey-soft:#eef0f3;
  --radius:10px; --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.04);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
h1,h2,h3,h4{margin:0;font-weight:650;line-height:1.25}
button{font:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:var(--ink)}
.wrap{max-width:1320px;margin:0 auto;padding:18px 20px 90px}

.topbar{display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:space-between;margin-bottom:14px}
.unit-name{font-size:23px;font-weight:700;outline:none;border:1px solid transparent;border-radius:6px;padding:2px 4px;margin:-2px -4px}
.unit-name:focus{border-color:var(--accent);background:#fff}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 11px;color:var(--ink);box-shadow:var(--shadow)}
.btn:hover{border-color:#cfd4dc}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#255fd1}
.btn.small{padding:4px 9px;font-size:12px}
.btn.ghost{box-shadow:none;background:transparent;border-style:dashed}
.savechip{font-size:11px;color:var(--muted)}

.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
.tab{background:none;border:none;padding:10px 14px;color:var(--muted);font-weight:550;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none}
.panel.active{display:block}

.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
@media(max-width:980px){.cols{grid-template-columns:1fr}}
.bu-col{display:flex;flex-direction:column;gap:12px;min-width:0}
.col-head{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:var(--radius);padding:11px 13px;box-shadow:var(--shadow)}
.col-name{font-size:15px;font-weight:700}
.col-quick{margin-top:6px}
.quick{background:var(--grey-soft);border:none;border-radius:99px;padding:3px 10px;font-size:11.5px;color:var(--ink)}
.quick:hover{background:#e2e6eb}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 13px;box-shadow:var(--shadow)}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:8px}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mc-title{font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:650}
.jump{border:1px solid var(--line);background:#fff;border-radius:6px;width:24px;height:22px;color:var(--accent);font-size:13px;line-height:1;padding:0}
.jump:hover{background:var(--accent-soft)}

table{width:100%;border-collapse:collapse}
th,td{text-align:right;padding:5px 6px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;font-size:12.5px}
th:first-child,td:first-child{text-align:left}
thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
tr.total td{font-weight:700;border-top:2px solid var(--line)}
td.editcell{padding:2px 3px}
td.editcell input{width:100%;min-width:48px;text-align:right;border:1px solid var(--line);border-radius:5px;padding:4px 5px;font-size:12px}
td.editcell input:focus{border-color:var(--accent);outline:none}
.fin-sub{font-size:12px;color:var(--ink);margin:14px 0 4px;font-weight:650}
.fin-sub:first-child{margin-top:0}
.fin-stack{display:flex;flex-direction:column;gap:14px}
.fin-section{padding:14px 16px}
.fin-section h3{font-size:14px;text-transform:none;letter-spacing:0;color:var(--ink);margin-bottom:6px}
.fin-section table{margin-bottom:4px}
.fin-select{border:1px solid var(--line);border-radius:6px;padding:4px 5px;font-size:12px;width:100%;min-width:0;background:#fff}
.fin-section td input[type="text"]{width:100%;border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-size:12px}
.fstat{background:#fbfcfd;border:1px solid var(--line);border-radius:8px;padding:8px;text-align:center}
.fsum-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid var(--line)}
.fsum-row:last-child{border-bottom:none}
.fsum-l{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.fsum-v{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.fsum-table{margin-top:2px}
.fsum-table th,.fsum-table td{padding:4px 4px;font-size:11px;text-align:right}
.fsum-table th:first-child,.fsum-table td:first-child{text-align:left;font-weight:600;color:var(--muted)}
.fsum-table thead th{border-bottom:1px solid var(--line)}
.fsum-table td.tot{font-weight:700;border-left:1px solid var(--line)}
.rev-grid th,.rev-grid td{padding:3px 4px;font-size:11.5px;white-space:nowrap}
.rev-grid td.editcell{padding:2px}
.rev-grid td.editcell input{min-width:40px;width:46px;text-align:right;padding:3px 4px}
.rev-grid td input[type="text"]{min-width:130px}
.rev-grid .qgrp{text-align:center;color:var(--muted);border-bottom:1px solid var(--line);font-size:10.5px}
.rev-grid td.tot{font-weight:700;background:#fbfcfd}

.snap-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.snap{background:#fbfcfd;border:1px solid var(--line);border-radius:8px;padding:9px 8px;cursor:pointer;text-align:center}
.snap:hover{border-color:var(--accent);background:var(--accent-soft)}
.snap-l{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.snap-v{font-size:16px;font-weight:700;margin-top:2px}

.hp-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
.hp-row:last-child{border-bottom:none}
.hp-jump{flex:none;width:24px;height:24px;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);border-radius:6px;font-size:13px;line-height:1;padding:0}
.hp-jump:hover{background:var(--accent);color:#fff}
.hp-title{flex:1;font-weight:550;min-width:0}
.hp-sub{flex:none;font-size:11px;color:var(--muted);background:var(--grey-soft);border-radius:99px;padding:1px 8px}

.plan-title{flex:1;font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:650;outline:none;border:1px solid transparent;border-radius:6px;padding:2px 4px;margin:-2px 0;min-width:0}
.plan-title:focus{border-color:var(--accent);color:var(--ink);background:#fff}
.plan-title.empty:before{content:attr(data-ph);color:#aab2bd}
.editable{outline:none;min-height:20px;border-radius:6px;padding:4px 6px;margin:-4px -6px;font-size:13px}
.editable:focus{box-shadow:0 0 0 2px var(--accent-soft);background:#fff}
.editable.empty:before{content:attr(data-ph);color:#9aa3b0}
.editable ul{margin:6px 0;padding-left:18px}

.add-card{display:flex;flex-direction:column;gap:8px}
.add-card>input{border:1px solid var(--line);border-radius:7px;padding:7px 9px;width:100%}
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.add-grid input,.add-grid select{border:1px solid var(--line);border-radius:7px;padding:6px 7px;font-size:12px;width:100%}

.task-item{border-top:1px solid var(--line);padding:9px 0}
.task-item:first-child{border-top:none;padding-top:2px}
.task-item .l1{display:flex;align-items:center;gap:7px}
.task-item .ti-title{flex:1;font-weight:550;border:1px solid transparent;border-radius:6px;padding:3px 5px;margin:-3px -5px;outline:none;min-width:0}
.task-item .ti-title:focus{border-color:var(--accent)}
.task-item.done .ti-title{text-decoration:line-through;color:var(--muted)}
.task-item .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:7px}
.task-item .meta select,.task-item .meta input{border:1px solid var(--line);border-radius:6px;padding:4px 5px;font-size:11.5px;width:100%;min-width:0}
.note-btn{flex:none;border:1px solid var(--line);background:#fff;border-radius:6px;padding:1px 6px;font-size:12px;line-height:1.5}
.note-btn.has{background:var(--amber-soft);border-color:#e8d48a}
.note-btn:hover{border-color:var(--accent)}
.ti-note-wrap{margin-top:6px}
.task-item .ti-note{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:4px 6px;outline:none;min-height:20px}
.task-item .ti-note:focus{border-color:var(--accent)}
.task-item .ti-note.empty:before{content:"+ add note";color:#aab2bd}
.subj-chip{flex:none;font-size:10.5px;color:var(--muted);background:var(--grey-soft);border-radius:99px;padding:1px 8px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
select.s-Highest{color:var(--red);background:var(--red-soft);font-weight:650}
.chk{width:16px;height:16px;flex:none;border-radius:3px;margin-left:2px;accent-color:#98a2b3}
.chk.p-VeryHigh{accent-color:#ef6c00;box-shadow:0 0 0 2px #ef6c00}
.chk.p-High{accent-color:#eab308;box-shadow:0 0 0 2px #eab308}
.chk.p-Medium{accent-color:#2f6fed;box-shadow:0 0 0 2px #2f6fed}
.chk.p-Low{accent-color:#98a2b3;box-shadow:0 0 0 2px #98a2b3}
.ti-chev{flex:none;border:none;background:none;color:var(--muted);font-size:12px;line-height:1;padding:3px 5px;border-radius:6px;transition:transform .15s}
.ti-chev.open{transform:rotate(90deg)}
.ti-chev:hover{background:var(--grey-soft)}
.ti-details{margin-top:8px}
.archive-head{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12.5px;font-weight:650;color:var(--muted);user-select:none}
.archive-head .chev{transition:transform .15s;display:inline-block}
.archive-head.open .chev{transform:rotate(90deg)}
.archive-list{margin-top:8px}
.task-item.archived{opacity:.65}
.task-item.flash{animation:flash 1.6s ease}
@keyframes flash{0%,40%{background:var(--amber-soft)}100%{background:transparent}}

.del{color:var(--grey);background:none;border:none;font-size:14px;line-height:1;padding:2px 5px;border-radius:6px;flex:none}
.del:hover{color:var(--red);background:var(--red-soft)}

.lead-add{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.lead-add input{flex:1 1 110px;min-width:90px;border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:12px}
.lead-add input:focus{border-color:var(--accent);outline:none}
.lead-add .btn{flex:none}
.lead-row{display:flex;align-items:flex-start;gap:8px;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)}
.lead-row:last-child{border-bottom:none}
.lr-main{min-width:0}
.lr-title{font-weight:600;font-size:12.5px}
.lr-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.lr-acts{display:flex;gap:4px;flex:none}

textarea.notes{width:100%;min-height:240px;border:1px solid var(--line);border-radius:8px;padding:10px 12px;resize:vertical}
.empty-state{color:var(--muted);font-style:italic;padding:8px 2px;font-size:12.5px}
.hint{font-size:12px;color:var(--muted)}

dialog{border:1px solid var(--line);border-radius:12px;padding:0;max-width:560px;width:92%;box-shadow:0 12px 40px rgba(16,24,40,.18)}
dialog .dlg-body{padding:18px}
dialog textarea{width:100%;min-height:240px;border:1px solid var(--line);border-radius:8px;padding:10px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
.dlg-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}

@media print{
  .toolbar,.tabs,.add-card,.lead-add,.del,.chk,.jump,.hp-jump,.quick,.lr-acts{display:none!important}
  .panel{display:block!important;page-break-before:always}
  .panel:first-of-type{page-break-before:avoid}
  .cols{grid-template-columns:repeat(3,1fr)!important}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="unit-name" id="unitName" contenteditable="true" spellcheck="false">WutzNxt Partner Businesses</div>
    <div class="toolbar">
      <span class="savechip" id="saveChip">Saved</span>
      <button class="btn small" onclick="window.print()">Print / PDF</button>
      <button class="btn small" id="exportBtn">Export</button>
      <button class="btn small" id="importBtn">Import</button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="financials">Financial Projections</button>
    <button class="tab" data-tab="tasks">Tasks</button>
    <button class="tab" data-tab="leads">Lead Sources</button>
    <button class="tab" data-tab="plan">Plan</button>
    <button class="tab" data-tab="notes">Notes</button>
  </div>

  <section class="panel active" id="panel-dashboard"><div class="cols" id="cols-dashboard"></div></section>
  <section class="panel" id="panel-financials"><div class="cols" id="cols-financials"></div></section>
  <section class="panel" id="panel-tasks"><div class="cols" id="cols-tasks"></div></section>
  <section class="panel" id="panel-leads"><div class="cols" id="cols-leads"></div></section>
  <section class="panel" id="panel-plan"><div class="cols" id="cols-plan"></div></section>
  <section class="panel" id="panel-notes"><div class="cols" id="cols-notes"></div></section>

</div>

<dialog id="ioDialog"><div class="dlg-body">
  <h3 id="ioTitle">Export</h3>
  <p class="hint" id="ioHint"></p>
  <textarea id="ioText" spellcheck="false"></textarea>
  <div class="dlg-actions">
    <button class="btn small" id="ioCopy">Copy</button>
    <button class="btn small" id="ioCancel">Close</button>
    <button class="btn primary small" id="ioApply" style="display:none">Load data</button>
  </div>
</div></dialog>

<script>
"use strict";
const LS_KEY="wnx_partners_v2";
const $=s=>document.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,9);
const fmtUSD=n=>(n<0?"-$":"$")+Math.abs(Math.round(n||0)).toLocaleString();
function fmtK(n){ n=Math.round(n||0); const a=Math.abs(n); const sg=n<0?"-":"";
  if(a>=1e6)return sg+(a/1e6).toFixed(a>=1e7?0:1).replace(/\.0$/,"")+"M";
  if(a>=1e3)return sg+(a/1e3).toFixed(a>=1e4?0:1).replace(/\.0$/,"")+"k";
  return ""+n; }

function el(tag,props){
  const e=document.createElement(tag);
  if(props)for(const k in props){
    const v=props[k];
    if(v==null)continue;
    if(k==="class")e.className=v;
    else if(k==="text")e.textContent=v;
    else if(k==="html")e.innerHTML=v;
    else if(k==="style")e.setAttribute("style",v);
    else if(k.slice(0,2)==="on")e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(let i=2;i<arguments.length;i++){
    const c=arguments[i]; if(c==null)continue;
    (Array.isArray(c)?c:[c]).forEach(x=>{ if(x==null)return; e.appendChild(typeof x==="string"?document.createTextNode(x):x); });
  }
  return e;
}

const BU_DEFS=[
  {key:"TSP",name:"Training Service Partner (TSP)",accent:"#2f6fed",pipelineLabel:"Trainings"},
  {key:"SI", name:"Systems Integrator (SI)",        accent:"#0e9384",pipelineLabel:"Contracts"},
  {key:"ISV",name:"Independent Software Vendor (ISV)",accent:"#7a5af8",pipelineLabel:null}
];
function planSeed(key){
  const sections=[["Overview",""],["Problem & opportunity",""],["Service offering",""],["Target clients",""],
    ["Pricing & revenue",""],["Go-to-market",""],["Team & org",""],["Milestones",""],["Risks",""]];
  if(key==="TSP"){
    sections[0][1]="Certified Microsoft Training partner that leads in-person and virtual training sessions for Microsoft customers.";
    sections[1][1]="Microsoft needs certified trainers to train their customers and has budget to pay for it. WutzNxt can leverage strong Microsoft relationships to get leads, referrals, and introductions to those at Microsoft who decide which partner to assign to a training opportunity. Trainings also open the door for WutzNxt to meet customers and identify other opportunities to work with them.";
    sections[2][1]="High-quality trainings for Microsoft customers: Modern Work, Copilot, and AI Transformation.";
  }
  return sections.map(s=>({id:uid(),title:s[0],body:s[1]}));
}
function migratePlan(key,v){
  if(Array.isArray(v)){ v.forEach(s=>{if(!s.id)s.id=uid();}); return v; }
  const KEYMAP=[["overview","Overview"],["problem","Problem & opportunity"],["offering","Service offering"],
    ["clients","Target clients"],["revenue","Pricing & revenue"],["gtm","Go-to-market"],
    ["team","Team & org"],["milestones","Milestones"],["risks","Risks"]];
  const o=v||{};
  if(!KEYMAP.some(km=>o[km[0]]&&String(o[km[0]]).trim())) return planSeed(key);
  return KEYMAP.map(km=>({id:uid(),title:km[1],body:o[km[0]]||""}));
}
function buDefault(key){
  return {
    pipeline: key!=="ISV" ? {
      "Completed":{mtd:0,qtd:0,ytd:0}, "Scheduled":{mtd:0,qtd:0,ytd:0},
      "In-Process":{mtd:0,qtd:0,ytd:0}, "In Pipeline":{mtd:0,qtd:0,ytd:0}
    } : null,
    products: key==="ISV" ? [] : null,
    credits:{ count:{mtd:0,qtd:0,ytd:0}, dollars:{mtd:0,qtd:0,ytd:0} },
    fin:{ rev:[], cost:[] },
    tasks:[],
    leads:[],
    plan:planSeed(key),
    notes:""
  };
}
function defaultState(){
  const s={title:"WutzNxt Partner Businesses", bu:{}, lastArchiveRun:0};
  BU_DEFS.forEach(d=>s.bu[d.key]=buDefault(d.key));
  s.bu.TSP.tasks=[
    {id:uid(),subject:"Delivery",title:"Schedule first training cohort",owner:"",status:"In progress",priority:"Very High",due:"",note:"",archived:false},
    {id:uid(),subject:"Sales",title:"Confirm credit purchase with first client",owner:"",status:"Not started",priority:"High",due:"",note:"",archived:false}];
  s.bu.SI.tasks=[
    {id:uid(),subject:"Delivery",title:"Kick off first integration contract",owner:"",status:"Not started",priority:"Very High",due:"",note:"",archived:false}];
  s.bu.ISV.tasks=[
    {id:uid(),subject:"Product",title:"Finalize first ISV product listing",owner:"",status:"Not started",priority:"Very High",due:"",note:"",archived:false}];
  return s;
}
function migrateLeads(v){
  if(Array.isArray(v)){ v.forEach(e=>{if(!e.id)e.id=uid();}); return v; }
  if(v&&typeof v==="object"){
    const has=v.primaryName||v.primaryCompany||v.wutznxtContact||(v.subSources&&v.subSources.length)||(v.trainingTypes&&v.trainingTypes.length);
    if(has) return [{id:uid(),name:v.primaryName||"",company:v.primaryCompany||"",contact:v.wutznxtContact||"",
      sub:(v.subSources||[]).map(s=>s&&s.name?s.name+(s.company?" ("+s.company+")":""):s).filter(Boolean).join(", "),
      types:(v.trainingTypes||[]).join(", ")}];
  }
  return [];
}
function migrateFin(v){
  if(!v||!Array.isArray(v.rev)||!Array.isArray(v.cost)) return {rev:[],cost:[]};
  const labels=fyMonths();
  v.rev=v.rev.map(l=>{
    if(Array.isArray(l.months)){ while(l.months.length<12)l.months.push(0); if(!l.id)l.id=uid(); return l; }
    const months=new Array(12).fill(0);
    const idx=labels.indexOf(l.month); if(idx>=0)months[idx]=+l.trainings||0; else if((+l.trainings||0))months[0]=+l.trainings||0;
    return {id:l.id||uid(), leadSource:l.leadSource||"", peoplePer:l.peoplePer||3, payPerPerson:l.payPerPerson||0, months};
  });
  v.cost.forEach(l=>{if(!l.id)l.id=uid();});
  return v;
}
function normalizeState(st){
  const base=defaultState();
  if(!st||!st.bu) return base;
  base.title=st.title||base.title; base.lastArchiveRun=st.lastArchiveRun||0;
  BU_DEFS.forEach(d=>{ if(st.bu[d.key]) base.bu[d.key]=Object.assign(buDefault(d.key), st.bu[d.key]); });
  BU_DEFS.forEach(d=>{
    base.bu[d.key].leads=migrateLeads(base.bu[d.key].leads);
    base.bu[d.key].plan=migratePlan(d.key, base.bu[d.key].plan);
    base.bu[d.key].fin=migrateFin(base.bu[d.key].fin);
    (base.bu[d.key].tasks||[]).forEach(t=>{ if(t.priority==="Highest")t.priority="Very High"; if(typeof t.archived!=="boolean")t.archived=false; });
  });
  return base;
}
function load(){
  try{ const st=JSON.parse(localStorage.getItem(LS_KEY)); if(st&&st.bu) return normalizeState(st); }catch(e){}
  return defaultState();
}
let state=load();
let BUS=BU_DEFS.map(d=>Object.assign({},d,{data:state.bu[d.key]}));
let archiveOpen={};

/* Most recent Saturday 09:00 MST (UTC-7), as a UTC timestamp */
function lastSaturday9MST(){
  const off=7*3600000, now=Date.now();
  const mst=new Date(now-off);
  let b=Date.UTC(mst.getUTCFullYear(),mst.getUTCMonth(),mst.getUTCDate(),9,0,0)+off;
  const diff=(mst.getUTCDay()-6+7)%7;
  b-=diff*86400000;
  if(b>now) b-=7*86400000;
  return b;
}
function runArchive(){
  const boundary=lastSaturday9MST();
  if((state.lastArchiveRun||0)<boundary){
    BUS.forEach(bu=>bu.data.tasks.forEach(t=>{ if(t.status==="Done") t.archived=true; }));
    state.lastArchiveRun=Date.now(); save();
  }
}

let _months=null;
function monthsList(){ if(_months)return _months;
  const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const now=new Date(); const out=[]; let d=new Date(now.getFullYear(),now.getMonth(),1);
  for(let i=0;i<12;i++){out.push(M[d.getMonth()]+" "+d.getFullYear());d.setMonth(d.getMonth()+1);}
  _months=out; return out;
}
let _fy=null;
function fyMonths(){ if(_fy)return _fy;
  const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const y=new Date().getFullYear(); const out=[]; let mo=6,yr=y;
  for(let i=0;i<12;i++){ out.push(M[mo]+" "+yr); mo++; if(mo>11){mo=0;yr++;} }
  _fy=out; return out;
}
function quarterOf(i){ return Math.floor(i/3); }
function finCalc(bu){
  const f=bu.data.fin||{rev:[],cost:[]};
  const rev=f.rev||[], cost=f.cost||[];
  let cAvg=0; if(cost.length){ let s=0; cost.forEach(c=>s+=+c.trainerPay||0); cAvg=s/cost.length; }
  const qT=[0,0,0,0], qR=[0,0,0,0];
  rev.forEach(r=>{ const pp=+r.peoplePer||0, pay=+r.payPerPerson||0;
    (r.months||[]).forEach((m,i)=>{ const t=+m||0; const q=quarterOf(i); qT[q]+=t; qR[q]+=t*pp*pay; }); });
  const qC=qT.map(t=>t*cAvg);
  const qN=qR.map((v,i)=>v-qC[i]);
  const trainings=qT.reduce((a,b)=>a+b,0);
  const dollars=qR.reduce((a,b)=>a+b,0);
  const costTot=qC.reduce((a,b)=>a+b,0);
  return {trainings,dollars,cost:costTot,net:dollars-costTot,cAvg,
    byQ:{trainings:qT,revenue:qR,cost:qC,net:qN}};
}

const PRI_ORDER={"Very High":0,High:1,Medium:2,Low:3};
function taskItem(bu,t){
  const item=el("div",{class:"task-item"+(t.status==="Done"?" done":"")+(t.archived?" archived":""),"data-taskid":t.id});
  const chk=el("input",{type:"checkbox",class:"chk p-"+(t.priority||"Medium").replace(/\s/g,"")}); chk.checked=t.status==="Done";
  chk.addEventListener("change",()=>{t.status=chk.checked?"Done":"Not started";save();renderTasks();renderDashboard();});
  const title=el("div",{class:"ti-title",contenteditable:"true",spellcheck:"false",text:t.title});
  title.addEventListener("input",()=>{t.title=title.textContent;save();});
  const chip=t.subject?el("span",{class:"subj-chip",text:t.subject}):null;
  const details=el("div",{class:"ti-details"}); details.style.display="none";
  const chev=el("button",{class:"ti-chev",title:"Show details",onClick:()=>{const o=details.style.display==="none";details.style.display=o?"block":"none";chev.classList.toggle("open",o);}},"▸");
  const del=el("button",{class:"del",onClick:()=>{bu.data.tasks=bu.data.tasks.filter(x=>x.id!==t.id);save();renderTasks();renderDashboard();}},"✕");
  const st=el("select");
  ["Not started","In progress","Blocked","Done"].forEach(s=>st.appendChild(el("option",{text:s}))); st.value=t.status;
  st.addEventListener("change",()=>{t.status=st.value;save();renderTasks();renderDashboard();});
  const pr=el("select");
  ["Very High","High","Medium","Low"].forEach(p=>pr.appendChild(el("option",{text:p}))); pr.value=t.priority;
  pr.addEventListener("change",()=>{t.priority=pr.value;chk.className="chk p-"+pr.value.replace(/\s/g,"");save();renderTasks();renderDashboard();});
  const owner=el("input",{type:"text",value:t.owner||"",placeholder:"Owner"}); owner.addEventListener("input",()=>{t.owner=owner.value;save();});
  const due=el("input",{type:"date",value:t.due||""}); due.addEventListener("input",()=>{t.due=due.value;save();});
  const note=el("div",{class:"ti-note",contenteditable:"true",spellcheck:"false",text:t.note||""});
  const se=()=>note.classList.toggle("empty",note.textContent.trim()===""); se();
  note.addEventListener("input",()=>{t.note=note.textContent;se();save();});
  details.appendChild(el("div",{class:"meta"},st,pr,owner,due));
  details.appendChild(note);
  if(t.archived) details.appendChild(el("button",{class:"btn small ghost",style:"margin-top:6px",onClick:()=>{t.archived=false;t.status="Not started";save();renderTasks();renderDashboard();}},"↩ Restore"));
  item.appendChild(el("div",{class:"l1"},chk,title,chip,chev,del));
  item.appendChild(details);
  return item;

  const add=()=>{ const v=tin.value.trim(); if(!v)return;
    bu.data.tasks.push({id:uid(),title:v,subject:sin.value.trim()||"",owner:oin.value.trim(),status:"Not started",priority:pin.value,due:din.value,note:nin.value.trim(),archived:false});
    save();renderTasks();renderDashboard(); };

  col.appendChild(el("div",{class:"card add-card"},

    nin,
    el("div",{style:"text-align:right"}, el("button",{class:"btn primary small",onClick:add},"Add task"))));
  const active=bu.data.tasks.filter(t=>!t.archived)
    .sort((a,b)=>(PRI_ORDER[a.priority]-PRI_ORDER[b.priority])||((a.due||"9999").localeCompare(b.due||"9999")));
  const archived=bu.data.tasks.filter(t=>t.archived);

  else { const listCard=el("div",{class:"card"}); active.forEach(t=>listCard.appendChild(taskItem(bu,t))); col.appendChild(listCard); }

    const card=el("div",{class:"card"});

    archived.forEach(t=>list.appendChild(taskItem(bu,t)));
    const head=el("div",{class:"archive-head"+(open?" open":"")},el("span",{class:"chev",text:"▸"}),el("span",{text:"Archive ("+archived.length+")"}));

/* ---------- LEAD SOURCES (submit + editable list) ---------- */
function leadRow(bu,ent){
  const row=el("div",{class:"lead-row"});
  function view(){ row.innerHTML="";
    const meta=[ent.contact?"WutzNxt: "+ent.contact:"",ent.sub?"Subs: "+ent.sub:"",ent.types?"Types: "+ent.types:""].filter(Boolean).join("  ·  ");
    row.appendChild(el("div",{class:"lr-main"},
      el("div",{class:"lr-title",text:(ent.name||"(no name)")+(ent.company?" — "+ent.company:"")}),
      meta?el("div",{class:"lr-meta",text:meta}):null));
    row.appendChild(el("div",{class:"lr-acts"},
      el("button",{class:"btn small ghost",onClick:edit},"Edit"),
      el("button",{class:"del",onClick:()=>{bu.data.leads=bu.data.leads.filter(x=>x.id!==ent.id);save();renderLeads();}},"✕")));
  }
  function edit(){ row.innerHTML="";
    const mk=(k,ph)=>{const i=el("input",{type:"text",value:ent[k]||"",placeholder:ph});i.dataset.k=k;i.addEventListener("keydown",e=>{if(e.key==="Enter")done();});return i;};
    const ins=[mk("name","Lead source name"),mk("company","Company"),mk("contact","WutzNxt contact"),mk("sub","Sub-lead sources"),mk("types","Training types")];
    function done(){ ins.forEach(i=>ent[i.dataset.k]=i.value.trim()); save(); view(); }
    row.appendChild(el("div",{class:"lead-add",style:"width:100%;margin:0"},...ins,el("button",{class:"btn primary small",onClick:done},"Save")));
  }
  view(); return row;
}
function leadsCol(bu){
  const col=el("div",{class:"bu-col"}); col.appendChild(colHead(bu));
  const card=el("div",{class:"card"}); card.appendChild(el("h3",{text:"Lead Sources"}));
  const inName=el("input",{type:"text",placeholder:"Lead source name"});
  const inCo=el("input",{type:"text",placeholder:"Company"});
  const inCon=el("input",{type:"text",placeholder:"WutzNxt contact"});
  const inSub=el("input",{type:"text",placeholder:"Sub-lead sources"});
  const inTypes=el("input",{type:"text",placeholder:"Training types"});
  const addEntry=()=>{ if(!inName.value.trim()&&!inCo.value.trim())return;
    bu.data.leads.push({id:uid(),name:inName.value.trim(),company:inCo.value.trim(),contact:inCon.value.trim(),sub:inSub.value.trim(),types:inTypes.value.trim()});
    save(); renderLeads(); };
  const inputs=[inName,inCo,inCon,inSub,inTypes];
  inputs.forEach(i=>i.addEventListener("keydown",e=>{if(e.key==="Enter")addEntry();}));
  card.appendChild(el("div",{class:"lead-add"},...inputs,el("button",{class:"btn primary small",onClick:addEntry},"Add")));
  if(bu.data.leads.length===0) card.appendChild(el("div",{class:"empty-state",text:"No lead sources yet — fill the fields and press Enter."}));
  bu.data.leads.forEach(ent=>card.appendChild(leadRow(bu,ent)));
  col.appendChild(card); return col;
}
function renderLeads(){ const c=$("#cols-leads"); c.innerHTML=""; BUS.forEach(bu=>c.appendChild(leadsCol(bu))); }

/* ---------- PLAN ---------- */
function planCol(bu){
  const col=el("div",{class:"bu-col"}); col.appendChild(colHead(bu));
  bu.data.plan.forEach(sec=>{
    const titleEl=el("div",{class:"plan-title",contenteditable:"true",spellcheck:"false","data-ph":"Section title",text:sec.title});
    const ts=()=>titleEl.classList.toggle("empty",titleEl.textContent.trim()===""); ts();
    titleEl.addEventListener("input",()=>{sec.title=titleEl.textContent;ts();save();});
    const del=el("button",{class:"del",title:"Delete section",onClick:()=>{bu.data.plan=bu.data.plan.filter(x=>x.id!==sec.id);save();renderPlan();}},"✕");
    const ed=el("div",{class:"editable",contenteditable:"true",spellcheck:"false","data-ph":"Add details…"});
    ed.innerHTML=sec.body||"";
    const se=()=>ed.classList.toggle("empty",ed.textContent.trim()===""); se();
    ed.addEventListener("input",()=>{sec.body=ed.innerHTML;se();save();});
    col.appendChild(el("div",{class:"card"},el("div",{class:"mc-head"},titleEl,del),ed));
  });
  col.appendChild(el("button",{class:"btn small ghost",onClick:()=>{bu.data.plan.push({id:uid(),title:"New section",body:""});save();renderPlan();}},"+ Add section"));
  return col;
}
function renderPlan(){ const c=$("#cols-plan"); c.innerHTML=""; BUS.forEach(bu=>c.appendChild(planCol(bu))); }

/* ---------- NOTES ---------- */
function notesCol(bu){
  const col=el("div",{class:"bu-col"}); col.appendChild(colHead(bu));
  const ta=el("textarea",{class:"notes",placeholder:"Notes from working sessions…"}); ta.value=bu.data.notes||"";
  ta.addEventListener("input",()=>{bu.data.notes=ta.value;save();});
  col.appendChild(el("div",{class:"card"},el("h3",{text:"Working Notes"}),ta));
  return col;
}
function renderNotes(){ const c=$("#cols-notes"); c.innerHTML=""; BUS.forEach(bu=>c.appendChild(notesCol(bu))); }

/* ---------- dispatch ---------- */
function renderTab(name){
  ({dashboard:renderDashboard,financials:renderFinancials,tasks:renderTasks,
    leads:renderLeads,plan:renderPlan,notes:renderNotes}[name])();
}

/* ---------- import / export ---------- */
const dlg=$("#ioDialog");
$("#exportBtn").addEventListener("click",()=>{ $("#ioTitle").textContent="Export";
  $("#ioHint").textContent="Copy this and paste to Claude for bulk updates, or keep as a backup.";
  $("#ioText").value=JSON.stringify(state,null,2); $("#ioText").readOnly=true; $("#ioApply").style.display="none"; dlg.showModal(); });
$("#importBtn").addEventListener("click",()=>{ $("#ioTitle").textContent="Import";
  $("#ioHint").textContent="Paste exported JSON (e.g. an updated version from Claude) and click Load data. Replaces current content.";
  $("#ioText").value=""; $("#ioText").readOnly=false; $("#ioApply").style.display="inline-block"; dlg.showModal(); });
$("#ioCopy").addEventListener("click",()=>{navigator.clipboard&&navigator.clipboard.writeText($("#ioText").value);});
$("#ioCancel").addEventListener("click",()=>dlg.close());
$("#ioApply").addEventListener("click",()=>{ try{ const s=JSON.parse($("#ioText").value);
  state=normalizeState(s); BUS=BU_DEFS.map(d=>Object.assign({},d,{data:state.bu[d.key]}));
  unitNameEl.textContent=state.title; save();
  renderTab(document.querySelector(".tab.active").dataset.tab); dlg.close();
}catch(e){ alert("Could not parse JSON: "+e.message); } });

const SB_ROW="main";
const SB_REST=SB_URL+"/rest/v1/model";
const SB_HEAD={apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"};
let lastCloudJSON="";
async function cloudLoad(){
  const r=await fetch(SB_REST+"?id=eq."+SB_ROW+"&select=data",{headers:SB_HEAD});
  if(!r.ok) throw new Error("load "+r.status);
  const rows=await r.json(); return (rows[0]&&rows[0].data)||null;
}
async function cloudSave(obj){
  const r=await fetch(SB_REST+"?id=eq."+SB_ROW,{method:"PATCH",headers:Object.assign({Prefer:"return=minimal"},SB_HEAD),body:JSON.stringify({data:obj})});
  if(!r.ok) throw new Error("save "+r.status);
  lastCloudJSON=JSON.stringify(obj);
}
function rerender(){ renderTab(document.querySelector(".tab.active").dataset.tab); }
function applyRemote(d){
  state=normalizeState(d); BUS=BU_DEFS.map(x=>Object.assign({},x,{data:state.bu[x.key]}));
  unitNameEl.textContent=state.title; runArchive(); rerender();
}
async function pollCloud(){
  try{ const d=await cloudLoad(); if(!d||!d.bu)return;
    const js=JSON.stringify(d); if(js===lastCloudJSON)return;
    const ae=document.activeElement;
    if(ae&&(ae.tagName==="INPUT"||ae.tagName==="SELECT"||ae.tagName==="TEXTAREA"||ae.isContentEditable))return;
    lastCloudJSON=js; applyRemote(d);
  }catch(e){}
}
async function initCloud(){
  try{
    const d=await cloudLoad();
    if(d&&d.bu){ lastCloudJSON=JSON.stringify(d); applyRemote(d); }
    else { await cloudSave(state); }
    $("#saveChip").textContent="Synced ✓";
    setInterval(pollCloud,15000);
  }catch(e){ $("#saveChip").textContent="Local only"; }
}

/* ---------- init ---------- */
runArchive();
renderTab("dashboard");
initCloud();
</script>
