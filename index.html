<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WutzNxt Partner Businesses</title>
<style>
:root{
  color-scheme: light;
  --bg:#f6f7f9; --card:#ffffff; --ink:#1c2128; --muted:#5b6573;
  --line:#e4e7ec; --accent:#2f6fed; --accent-soft:#eaf1fe;
  --green:#1a7f37; --green-soft:#e6f4ea; --amber:#9a6700; --amber-soft:#fdf3d7;
  --red:#b42318; --red-soft:#fdeceb; --grey:#667085; --grey-soft:#eef0f3;
  --radius:10px; --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.04);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
h1,h2,h3,h4{margin:0;font-weight:650;line-height:1.25}
button{font:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:var(--ink)}
select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%235b6573' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 6px center;background-size:20px 20px;padding-right:28px!important}
.wrap{max-width:1320px;margin:0 auto;padding:18px 20px 90px}

.topbar{display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:space-between;margin-bottom:14px}
.unit-name{font-size:23px;font-weight:700;outline:none;border:1px solid transparent;border-radius:6px;padding:2px 4px;margin:-2px -4px}
.unit-name:focus{border-color:var(--accent);background:#fff}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 11px;color:var(--ink);box-shadow:var(--shadow)}
.btn:hover{border-color:#cfd4dc}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#255fd1}
.btn.small{padding:4px 9px;font-size:12px}
.btn.ghost{box-shadow:none;background:transparent;border-style:dashed}
.savechip{font-size:11px;color:var(--muted)}

.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
.tab{background:none;border:none;padding:10px 14px;color:var(--muted);font-weight:550;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none}
.panel.active{display:block}

.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
@media(max-width:980px){.cols{grid-template-columns:1fr}}
.bu-col{display:flex;flex-direction:column;gap:12px;min-width:0}
.col-head{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:var(--radius);padding:11px 13px;box-shadow:var(--shadow)}
.col-name{font-size:15px;font-weight:700}
.col-quick{margin-top:6px}
.quick{background:var(--grey-soft);border:none;border-radius:99px;padding:3px 10px;font-size:11.5px;color:var(--ink)}
.quick:hover{background:#e2e6eb}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 13px;box-shadow:var(--shadow)}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:8px}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mc-title{font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:650}
.jump{border:1px solid var(--line);background:#fff;border-radius:6px;width:24px;height:22px;color:var(--accent);font-size:13px;line-height:1;padding:0}
.jump:hover{background:var(--accent-soft)}

table{width:100%;border-collapse:collapse}
th,td{text-align:right;padding:5px 6px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;font-size:12.5px}
th:first-child,td:first-child{text-align:left}
thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
tr.total td{font-weight:700;border-top:2px solid var(--line)}
td.editcell{padding:2px 3px}
td.editcell input{width:100%;min-width:48px;text-align:right;border:1px solid var(--line);border-radius:5px;padding:4px 5px;font-size:12px}
td.editcell input:focus{border-color:var(--accent);outline:none}
.fin-sub{font-size:12px;color:var(--ink);margin:14px 0 4px;font-weight:650}
.fin-sub:first-child{margin-top:0}
.fin-stack{display:flex;flex-direction:column;gap:14px}
.fin-section{padding:14px 16px}
.fin-section h3{font-size:14px;text-transform:none;letter-spacing:0;color:var(--ink);margin-bottom:6px}
.fin-section table{margin-bottom:4px}
.fin-select{border:1px solid var(--line);border-radius:6px;padding:4px 5px;font-size:12px;width:100%;min-width:0;background-color:#fff}
.fin-section td input[type="text"]{width:100%;border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-size:12px}
.fstat{background:#fbfcfd;border:1px solid var(--line);border-radius:8px;padding:8px;text-align:center}
.fsum-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid var(--line)}
.fsum-row:last-child{border-bottom:none}
.fsum-l{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.fsum-v{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.fsum-table{margin-top:2px}
.fsum-table th,.fsum-table td{padding:4px 4px;font-size:11px;text-align:right}
.fsum-table th:first-child,.fsum-table td:first-child{text-align:left;font-weight:600;color:var(--muted)}
.fsum-table thead th{border-bottom:1px solid var(--line)}
.fsum-table td.tot{font-weight:700;border-left:1px solid var(--line)}
.rev-grid th,.rev-grid td{padding:3px 4px;font-size:11.5px;white-space:nowrap}
.rev-grid td.editcell{padding:2px}
.rev-grid td.editcell input{min-width:40px;width:46px;text-align:right;padding:3px 4px}
.rev-grid td input[type="text"]{min-width:130px}
.rev-grid .qgrp{text-align:center;color:var(--muted);border-bottom:1px solid var(--line);font-size:10.5px}
.rev-grid td.tot{font-weight:700;background:#fbfcfd}

.snap-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.snap{background:#fbfcfd;border:1px solid var(--line);border-radius:8px;padding:9px 8px;cursor:pointer;text-align:center}
.snap:hover{border-color:var(--accent);background:var(--accent-soft)}
.snap-l{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.snap-v{font-size:16px;font-weight:700;margin-top:2px}

.hp-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
.hp-row:last-child{border-bottom:none}
.hp-jump{flex:none;width:24px;height:24px;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);border-radius:6px;font-size:13px;line-height:1;padding:0}
.hp-jump:hover{background:var(--accent);color:#fff}
.hp-title{flex:1;font-weight:550;min-width:0}
.hp-sub{flex:none;font-size:11px;color:var(--muted);background:var(--grey-soft);border-radius:99px;padding:1px 8px}

.plan-title{flex:1;font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:650;outline:none;border:1px solid transparent;border-radius:6px;padding:2px 4px;margin:-2px 0;min-width:0}
.plan-title:focus{border-color:var(--accent);color:var(--ink);background:#fff}
.plan-title.empty:before{content:attr(data-ph);color:#aab2bd}
.editable{outline:none;min-height:20px;border-radius:6px;padding:4px 6px;margin:-4px -6px;font-size:13px}
.editable:focus{box-shadow:0 0 0 2px var(--accent-soft);background:#fff}
.editable.empty:before{content:attr(data-ph);color:#9aa3b0}
.editable ul{margin:6px 0;padding-left:18px}
.chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--grey-soft);color:var(--ink);border-radius:99px;padding:3px 4px 3px 10px;font-size:12px}
.chip-x{border:none;background:none;color:var(--muted);font-size:15px;line-height:1;cursor:pointer;padding:0 3px}
.chip-x:hover{color:var(--red)}
.chip-input{border:1px dashed var(--line);border-radius:99px;padding:3px 10px;font-size:12px;min-width:90px;flex:1}
.chip-input:focus{border-color:var(--accent);outline:none}
.lead-wrap{display:flex;flex-direction:column;gap:14px}
.link-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.link-row:last-child{border-bottom:none}
.link-a{color:var(--accent);font-weight:550;text-decoration:none;word-break:break-word;padding-top:2px}
.link-a:hover{text-decoration:underline}
.link-edit{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.link-edit input{flex:1 1 200px;min-width:120px;border:1px solid var(--line);border-radius:7px;padding:7px 9px}
.link-edit input:focus{border-color:var(--accent);outline:none}
.lr-main{min-width:0}
.lr-title{font-weight:600;font-size:12.5px}
.lr-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.lr-acts{display:flex;gap:4px;flex:none}
.sow-pill{border-radius:99px;padding:2px 10px;font-size:11px;font-weight:600;white-space:nowrap;flex:none}
.sow-legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.sow-list .l1{gap:11px;align-items:center}
.sow-list .lead-name{font-size:25px}
.sow-list .co-logo svg,.sow-list .co-logo img{height:26px;width:auto}
.sow-list .co-avatar{width:28px;height:28px;font-size:15px;border-radius:6px}
.sow-owner{font-size:19px;color:var(--muted);white-space:nowrap;flex:none}
.sow-list .sow-pill{font-size:19px;padding:4px 14px}
.sow-list .lead-item{padding:12px 0}
.view-toggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:14px}
.view-toggle button{border:none;background:#fff;padding:7px 28px;font-size:12.5px;color:var(--muted);font-weight:550;cursor:pointer;min-width:210px;text-align:center}
.view-toggle button.on{background:var(--accent);color:#fff}
.tn-table th,.tn-table td{text-align:left;font-size:13px}
.tn-table th.c,.tn-table td.c{text-align:center}
.tn-check{width:18px;height:18px;cursor:pointer;accent-color:var(--accent)}
.recon-banner{border-radius:8px;padding:8px 10px;font-size:12.5px;font-weight:600;margin-bottom:8px}
.recon-removed{color:var(--red);font-size:12px}
.recon-added{color:var(--green);font-size:12px}

.add-card{display:flex;flex-direction:column;gap:8px}
.add-card>input{border:1px solid var(--line);border-radius:7px;padding:7px 9px;width:100%}
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.add-grid input,.add-grid select{border:1px solid var(--line);border-radius:7px;padding:6px 7px;font-size:12px;width:100%}

.task-item{border-top:1px solid var(--line);padding:9px 0}
.task-item:first-child{border-top:none;padding-top:2px}
.task-item .l1{display:flex;align-items:center;gap:7px}
.task-item .ti-title{flex:1;font-weight:550;border:1px solid transparent;border-radius:6px;padding:3px 5px;margin:-3px -5px;outline:none;min-width:0}
.task-item .ti-title:focus{border-color:var(--accent)}
.task-item.done .ti-title{text-decoration:line-through;color:var(--muted)}
.task-item .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:7px}
.task-item .meta select,.task-item .meta input{border:1px solid var(--line);border-radius:6px;padding:4px 5px;font-size:11.5px;width:100%;min-width:0}
.note-btn{flex:none;border:1px solid var(--line);background:#fff;border-radius:6px;padding:1px 6px;font-size:12px;line-height:1.5}
.note-btn.has{background:var(--amber-soft);border-color:#e8d48a}
.note-btn:hover{border-color:var(--accent)}
.ti-note-wrap{margin-top:6px}
.task-item .ti-note{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:4px 6px;outline:none;min-height:20px}
.task-item .ti-note:focus{border-color:var(--accent)}
.task-item .ti-note.empty:before{content:"+ add note";color:#aab2bd}
.subj-chip{flex:none;font-size:10.5px;color:var(--muted);background:var(--grey-soft);border-radius:99px;padding:1px 8px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
select.s-Highest{color:var(--red);background:var(--red-soft);font-weight:650}
.chk{appearance:none;-webkit-appearance:none;width:16px;height:16px;flex:none;border:1.5px solid #111;border-radius:3px;margin-left:2px;cursor:pointer;position:relative;background:#98a2b3}
.chk.p-VeryHigh{background:#ef6c00}
.chk.p-High{background:#eab308}
.chk.p-Medium{background:#2f6fed}
.chk.p-Low{background:#98a2b3}
.chk:checked::after{content:"✓";position:absolute;top:-2px;left:2px;color:#fff;font-size:12px;font-weight:800;line-height:1}
.ti-chev{flex:none;border:none;background:none;color:var(--muted);font-size:12px;line-height:1;padding:3px 5px;border-radius:6px;transition:transform .15s}
.ti-chev.open{transform:rotate(90deg)}
.ti-chev:hover{background:var(--grey-soft)}
.ti-details{margin-top:8px}
.archive-head{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12.5px;font-weight:650;color:var(--muted);user-select:none}
.archive-head .chev{transition:transform .15s;display:inline-block}
.archive-head.open .chev{transform:rotate(90deg)}
.archive-list{margin-top:8px}
.task-item.archived{opacity:.65}
.task-item.flash{animation:flash 1.6s ease}
@keyframes flash{0%,40%{background:var(--amber-soft)}100%{background:transparent}}

.del{color:var(--grey);background:none;border:none;font-size:14px;line-height:1;padding:2px 5px;border-radius:6px;flex:none}
.del:hover{color:var(--red);background:var(--red-soft)}

.fld{margin-bottom:8px}
.fld-l{display:block;font-size:11.5px;color:var(--muted);margin:0 0 3px}
.fld input{width:100%;border:1px solid var(--line);border-radius:7px;padding:7px 9px}
.fld input:focus{border-color:var(--accent);outline:none}

.lead-item{border-top:1px solid var(--line);padding:8px 0}
.lead-item:first-of-type{border-top:none}
.lead-item .l1{display:flex;align-items:center;gap:8px}
.co-logo{display:inline-flex;flex:none;line-height:0}
.co-avatar{flex:none;width:18px;height:18px;border-radius:4px;background:var(--grey-soft);color:var(--muted);font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.lead-name{font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lead-role{color:var(--muted);font-size:12px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.lead-status{margin-left:auto;flex:none;border-radius:99px;padding:2px 8px;font-size:10px;letter-spacing:1px;white-space:nowrap}
.lead-status.st-green{background:var(--green-soft);color:var(--green)}
.lead-status.st-yellow{background:var(--amber-soft);color:var(--amber)}
.lead-status.st-grey{background:var(--grey-soft);color:var(--grey)}
.lead-details{margin-top:8px;padding-left:26px}
.lead-ta{width:100%;min-height:46px;border:1px solid var(--line);border-radius:7px;padding:6px 8px;resize:vertical}
.lead-check{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:13px}
.star-edit .star{cursor:pointer;font-size:17px;color:#e0a400;letter-spacing:2px}

textarea.notes{width:100%;min-height:240px;border:1px solid var(--line);border-radius:8px;padding:10px 12px;resize:vertical}
.empty-state{color:var(--muted);font-style:italic;padding:8px 2px;font-size:12.5px}
.hint{font-size:12px;color:var(--muted)}

dialog{border:1px solid var(--line);border-radius:12px;padding:0;max-width:560px;width:92%;box-shadow:0 12px 40px rgba(16,24,40,.18)}
dialog .dlg-body{padding:18px}
dialog textarea{width:100%;min-height:240px;border:1px solid var(--line);border-radius:8px;padding:10px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
.dlg-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}

@media print{
  .toolbar,.tabs,.add-card,.lead-add,.del,.chk,.jump,.hp-jump,.quick,.lr-acts,.ti-chev{display:none!important}
  .panel{display:block!important;page-break-before:always}
  .panel:first-of-type{page-break-before:avoid}
  .cols{grid-template-columns:repeat(3,1fr)!important}
  .lead-details{display:block!important}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="unit-name" id="unitName" contenteditable="true" spellcheck="false">WutzNxt Partner Businesses</div>
    <div class="toolbar">
      <span class="savechip" id="saveChip">Saved</span>
      <button class="btn small" onclick="window.print()">Print / PDF</button>
      <button class="btn small" id="exportBtn">Export</button>
      <button class="btn small" id="importBtn">Import</button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="plan">Plan</button>
    <button class="tab" data-tab="tasks">Tasks</button>
    <button class="tab" data-tab="people">People Resources</button>
    <button class="tab" data-tab="leads">Lead Sources</button>
    <button class="tab" data-tab="sows">SOWs</button>
    <button class="tab" data-tab="training">Training Links</button>
    <button class="tab" data-tab="financials">Financial Projections</button>
    <button class="tab" data-tab="notes">Notes</button>
    <button class="tab" data-tab="reconcile">Reconcile</button>
    <button class="tab" data-tab="dashboard">Dashboard</button>
  </div>

  <section class="panel active" id="panel-plan"><div class="cols" id="cols-plan"></div></section>
  <section class="panel" id="panel-tasks"><div class="cols" id="cols-tasks"></div></section>
  <section class="panel" id="panel-people"><div id="cols-people"></div></section>
  <section class="panel" id="panel-leads"><div class="cols" id="cols-leads"></div></section>
  <section class="panel" id="panel-sows"><div id="cols-sows"></div></section>
  <section class="panel" id="panel-training"><div id="cols-training"></div></section>
  <section class="panel" id="panel-financials"><div class="cols" id="cols-financials"></div></section>
  <section class="panel" id="panel-notes"><div class="cols" id="cols-notes"></div></section>
  <section class="panel" id="panel-reconcile"><div id="cols-reconcile"></div></section>
  <section class="panel" id="panel-dashboard"><div class="cols" id="cols-dashboard"></div></section>

</div>

<dialog id="ioDialog"><div class="dlg-body">
  <h3 id="ioTitle">Export</h3>
  <p class="hint" id="ioHint"></p>
  <textarea id="ioText" spellcheck="false"></textarea>
  <div class="dlg-actions">
    <button class="btn small" id="ioCopy">Copy</button>
    <button class="btn small" id="ioCancel">Close</button>
    <button class="btn primary small" id="ioApply" style="display:none">Load data</button>
  </div>
</div></dialog>

<script>
"use strict";
const LS_KEY="wnx_partners_v2";
const SNAP_KEY="wnx_snapshots_v1";
const $=s=>document.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,9);
const fmtUSD=n=>(n<0?"-$":"$")+Math.abs(Math.round(n||0)).toLocaleString();
function fmtK(n){ n=Math.round(n||0); const a=Math.abs(n); const sg=n<0?"-":"";
  if(a>=1e6)return sg+(a/1e6).toFixed(a>=1e7?0:1).replace(/\.0$/,"")+"M";
  if(a>=1e3)return sg+(a/1e3).toFixed(a>=1e4?0:1).replace(/\.0$/,"")+"k";
  return ""+n; }

function el(tag,props){
  const e=document.createElement(tag);
  if(props)for(const k in props){
    const v=props[k];
    if(v==null)continue;
    if(k==="class")e.className=v;
    else if(k==="text")e.textContent=v;
    else if(k==="html")e.innerHTML=v;
    else if(k==="style")e.setAttribute("style",v);
    else if(k.slice(0,2)==="on")e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(let i=2;i<arguments.length;i++){
    const c=arguments[i]; if(c==null)continue;
    (Array.isArray(c)?c:[c]).forEach(x=>{ if(x==null)return; e.appendChild(typeof x==="string"?document.createTextNode(x):x); });
  }
  return e;
}

const BU_DEFS=[
  {key:"TSP",name:"Training Service Partner (TSP)",accent:"#2f6fed",pipelineLabel:"Trainings"},
  {key:"SI", name:"Systems Integrator (SI)",        accent:"#0e9384",pipelineLabel:"Contracts"},
  {key:"ISV",name:"Independent Software Vendor (ISV)",accent:"#7a5af8",pipelineLabel:null}

function planSeed(key){

/* Most recent Saturday 09:00 MST (UTC-7), as a UTC timestamp */
function lastSaturday9MST(){
  const off=7*3600000, now=Date.now();
  const mst=new Date(now-off);
  let b=Date.UTC(mst.getUTCFullYear(),mst.getUTCMonth(),mst.getUTCDate(),9,0,0)+off;
  const diff=(mst.getUTCDay()-6+7)%7;
  b-=diff*86400000;
  if(b>now) b-=7*86400000;
  return b;
}

function quarterOf(i){ return Math.floor(i/3); }
function finCalc(bu){
  const f=bu.data.fin||{rev:[],cost:[]};
  const rev=f.rev||[], cost=f.cost||[];
  let cAvg=0; if(cost.length){ let s=0; cost.forEach(c=>s+=+c.trainerPay||0); cAvg=s/cost.length; }
  const qT=[0,0,0,0], qR=[0,0,0,0];
  rev.forEach(r=>{ const pp=+r.peoplePer||0, pay=+r.payPerPerson||0;
    (r.months||[]).forEach((m,i)=>{ const t=+m||0; const q=quarterOf(i); qT[q]+=t; qR[q]+=t*pp*pay; }); });
  const qC=qT.map(t=>t*cAvg);
  const qN=qR.map((v,i)=>v-qC[i]);
  const trainings=qT.reduce((a,b)=>a+b,0);
  const dollars=qR.reduce((a,b)=>a+b,0);
  const costTot=qC.reduce((a,b)=>a+b,0);
  return {trainings,dollars,cost:costTot,net:dollars-costTot,cAvg,

}

/* ---------- RECONCILE (snapshots + diff to catch lost data) ---------- */
function loadSnaps(){ try{return JSON.parse(localStorage.getItem(SNAP_KEY))||[];}catch(e){return [];} }
function saveSnaps(a){ try{localStorage.setItem(SNAP_KEY,JSON.stringify(a));}catch(e){} }
function collectItems(st){
  const out={}; const push=(name,arr,lab)=>{ out[name]=(Array.isArray(arr)?arr:[]).map(x=>({id:(x&&x.id)||"", label:lab(x||{})})); };
  BU_DEFS.forEach(d=>{ const bu=st&&st.bu&&st.bu[d.key]; if(!bu)return;
    push(d.key+" tasks", bu.tasks, t=>t.title||"(untitled)");
    push(d.key+" lead sources", bu.leads, l=>l.name||l.company||"(no name)");
    push(d.key+" plan sections", bu.plan, s=>s.title||"(section)");
    push(d.key+" revenue lines", bu.fin&&bu.fin.rev, r=>r.leadSource||"(lead source)");
    push(d.key+" cost rows", bu.fin&&bu.fin.cost, c=>((c.delivery||"")+" "+(c.length||"")).trim()||"(cost)");
  });
  push("SOWs", st&&st.sows, s=>(s.company?s.company+" — ":"")+(s.title||"(untitled)"));
  push("General contacts", st&&st.generalContacts, c=>c.name||"(no name)");
  push("Training links", st&&st.trainingLinks, l=>l.title||l.url||"(link)");
  push("People resources", st&&st.people, p=>p.name||"(no name)");
  return out;
}
function totalCount(st){ const c=collectItems(st); return Object.keys(c).reduce((a,k)=>a+c[k].length,0); }
function takeSnapshot(label,opts){ opts=opts||{};
  const snaps=loadSnaps(); const now=Date.now(); const last=snaps[snaps.length-1];
  const dataStr=JSON.stringify(state);
  if(last && JSON.stringify(last.data)===dataStr) return;
  if(!opts.force && last && (now-last.ts)<600000) return;
  snaps.push({ts:now,label:label||"",total:totalCount(state),data:JSON.parse(dataStr)});
  while(snaps.length>20) snaps.shift();
  saveSnaps(snaps);
}
function countsTable(st){
  const items=collectItems(st); const body=el("tbody"); let tot=0;
  Object.keys(items).forEach(k=>{ const n=items[k].length; tot+=n; body.appendChild(el("tr",{},el("td",{text:k}),el("td",{text:String(n)}))); });
  body.appendChild(el("tr",{class:"total"},el("td",{text:"Total items"}),el("td",{text:String(tot)})));
  return el("table",{style:"max-width:440px"},el("thead",{},el("tr",{},el("th",{text:"Section"}),el("th",{text:"Count"}))),body);
}
function showDiff(oldSt,newSt,oldLabel,newLabel){
  const area=$("#reconDiff"); if(!area)return; area.innerHTML="";
  area.appendChild(el("div",{class:"fin-sub",text:"Comparison: "+oldLabel+" → "+newLabel}));
  const oi=collectItems(oldSt), ni=collectItems(newSt);
  const keys=[...new Set([...Object.keys(oi),...Object.keys(ni)])].sort();
  let lost=0; const blocks=[];
  keys.forEach(k=>{
    const oldArr=oi[k]||[], newArr=ni[k]||[];
    const newIds=new Set(newArr.map(x=>x.id)), oldIds=new Set(oldArr.map(x=>x.id));
    const removed=oldArr.filter(x=>x.id&&!newIds.has(x.id));
    const added=newArr.filter(x=>x.id&&!oldIds.has(x.id));
    if(removed.length||added.length||oldArr.length!==newArr.length){
      const block=el("div",{style:"margin:8px 0"});
      block.appendChild(el("div",{style:"font-weight:650;font-size:12.5px",text:k+": "+oldArr.length+" → "+newArr.length}));
      removed.forEach(r=>{ lost++; block.appendChild(el("div",{class:"recon-removed",text:"− removed: "+r.label})); });
      added.forEach(a=>{ block.appendChild(el("div",{class:"recon-added",text:"+ added: "+a.label})); });
      blocks.push(block);
    }
  });
  area.appendChild(el("div",{class:"recon-banner",style:(lost?"background:var(--red-soft);color:var(--red)":"background:var(--green-soft);color:var(--green)"),
    text:(lost? ("⚠ "+lost+" item"+(lost>1?"s":"")+" removed since "+oldLabel+" — shown in red below.") : "No items lost since "+oldLabel+".")}));
  if(blocks.length) blocks.forEach(b=>area.appendChild(b));
  else area.appendChild(el("div",{class:"empty-state",text:"No differences at all."}));
}
function renderReconcile(){
  const c=$("#cols-reconcile"); c.innerHTML="";
  const card=el("div",{class:"card",style:"max-width:920px"});
  card.appendChild(el("h3",{text:"Reconcile / Data health"}));
  card.appendChild(el("p",{class:"hint",text:"Snapshots are kept in this browser (auto-saved as you work and each time it syncs from the cloud). Compare any snapshot — or a pasted Export backup — to now; anything removed appears in red."}));
  card.appendChild(el("div",{style:"display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 12px"},
    el("button",{class:"btn primary small",onClick:()=>{takeSnapshot("Manual",{force:true});renderReconcile();}},"Save snapshot now"),
    el("button",{class:"btn small",onClick:openCompareBackup},"Compare a backup")));
  card.appendChild(el("div",{class:"fin-sub",text:"Current data health"}));
  card.appendChild(countsTable(state));
  card.appendChild(el("div",{class:"fin-sub",text:"Snapshots (newest first)"}));
  const snaps=loadSnaps().slice().reverse();
  if(!snaps.length) card.appendChild(el("div",{class:"empty-state",text:"No snapshots yet — one is saved automatically as you work."}));
  snaps.forEach(sn=>{
    const when=new Date(sn.ts).toLocaleString();
    const row=el("div",{class:"link-row"});
    row.appendChild(el("div",{class:"lr-main"},el("div",{class:"lr-title",text:when+(sn.label?"  ·  "+sn.label:"")}),el("div",{class:"lr-meta",text:sn.total+" items"})));
    row.appendChild(el("div",{class:"lr-acts"},
      el("button",{class:"btn small ghost",onClick:()=>showDiff(sn.data,state,"Snapshot @ "+when,"Now")},"Compare to now"),
      el("button",{class:"btn small",onClick:()=>{ if(confirm("Restore this snapshot? Current data will be replaced (a backup snapshot is taken first).")){ takeSnapshot("Before restore",{force:true}); state=normalizeState(sn.data); state.ts=Date.now(); BUS=BU_DEFS.map(d=>Object.assign({},d,{data:state.bu[d.key]})); unitNameEl.textContent=state.title; save(); renderReconcile(); } }},"Restore")));
    card.appendChild(row);
  });
  card.appendChild(el("div",{id:"reconDiff",style:"margin-top:14px"}));
  c.appendChild(card);
}

/* ---------- cloud sync (Supabase) — timestamp-based last-write-wins ---------- */
const SB_URL="https://cctewpwmfgibuidhlehk.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjdGV3cHdtZmdpYnVpZGhsZWhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTg3MTQsImV4cCI6MjA5ODQ5NDcxNH0.7G-5LKJkL6IH9Hi7jMfL93GDPI3sLvDtA-WYqRzWOEI";
const SB_ROW="main";
const SB_REST=SB_URL+"/rest/v1/model";
const SB_HEAD={apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"};
let lastCloudJSON="";
async function cloudLoad(){
  const r=await fetch(SB_REST+"?id=eq."+SB_ROW+"&select=data",{headers:SB_HEAD});
  if(!r.ok) throw new Error("load "+r.status);
  const rows=await r.json(); return (rows[0]&&rows[0].data)||null;
}
async function cloudSave(obj){
  const r=await fetch(SB_REST+"?id=eq."+SB_ROW,{method:"PATCH",headers:Object.assign({Prefer:"return=minimal"},SB_HEAD),body:JSON.stringify({data:obj})});
  if(!r.ok) throw new Error("save "+r.status);
  lastCloudJSON=JSON.stringify(obj);
}
function rerender(){ renderTab(document.querySelector(".tab.active").dataset.tab); }
function applyRemote(d){
  state=normalizeState(d); BUS=BU_DEFS.map(x=>Object.assign({},x,{data:state.bu[x.key]}));
  unitNameEl.textContent=state.title; runArchive(); rerender();
  try{takeSnapshot("Synced from cloud",{force:true});}catch(e){}
}
async function pollCloud(){
  try{ const d=await cloudLoad(); if(!d||!d.bu)return;
    if((d.ts||0) <= (state.ts||0)) return;   /* only accept strictly newer remote — never clobber newer local */
    const ae=document.activeElement;
    if(ae&&(ae.tagName==="INPUT"||ae.tagName==="SELECT"||ae.tagName==="TEXTAREA"||ae.isContentEditable))return;
    lastCloudJSON=JSON.stringify(d); applyRemote(d);
  }catch(e){}
}
async function initCloud(){
  try{
    const d=await cloudLoad();
    if(d&&d.bu){
      const rt=d.ts||0, lt=state.ts||0;
      if(rt>=lt){ lastCloudJSON=JSON.stringify(d); applyRemote(d); }   /* cloud newer-or-equal → take the shared cloud copy (keeps current data) */
      else { await cloudSave(state); }                                /* local strictly newer → push it up */
    }
    else { await cloudSave(state); }
    $("#saveChip").textContent="Synced ✓";
    setInterval(pollCloud,15000);
  }catch(e){ $("#saveChip").textContent="Local only"; }
}

/* ---------- init ---------- */
runArchive();
renderTab("plan");
try{takeSnapshot("Load",{force:true});}catch(e){}
initCloud();
